<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommender</title>
</head>
<body>
    <h1>Movie Recommender</h1>
    <form action="/get_recommendations" method="POST">
        <label for="user_id">Enter User ID:</label>
        <input type="number" id="user_id" name="user_id" required>
        
        <label for="n_recommendations">Enter Number of Recommendations (optional):</label>
        <input type="number" id="n_recommendations" name="n_recommendations">
        
        <button type="submit">Get Recommendations</button>
    </form>

    {% if movies %}
    <h2>Recommended Movies for User ID "{{ user_id }}"</h2>
    <ul>
        {% for movie in movies %}
            <li>{{ movie }}</li>
        {% endfor %}
    </ul>
    {% elif error %}
    <h2>{{ error }}</h2>
    {% endif %}
</body>
</html>
